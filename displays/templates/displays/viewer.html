<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Signage Player</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050510;
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #media-container {
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 10;
        }

        .media-element {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        .media-element.active {
            opacity: 1;
        }

        #status {
            position: absolute;
            z-index: 5;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: #00e5ff;
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        h1 {
            font-weight: 300;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #00e5ff, #bd00ff);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>

    <div id="status">
        <div class="spinner"></div>
        <h1 id="status-text">INITIALIZING...</h1>
    </div>

    <div id="media-container"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let token = urlParams.get('token');
        if (token) {
            token = token.replace(/</g, '').replace(/>/g, '');
        }
        const statusText = document.getElementById('status-text');
        const mediaContainer = document.getElementById('media-container');
        
        let playlist = [];
        let currentIndex = 0;
        let isPlaying = false;
        let currentTimer = null;

        let pingInterval = null;

        if (!token) {
            statusText.innerText = 'NO TOKEN PROVIDED';
            document.querySelector('.spinner').style.display = 'none';
        } else {
            initPlayer();
        }

        async function initPlayer() {
            statusText.innerText = 'FETCHING PLAYLIST...';
            if (!pingInterval) {
                startPinging(); // Start pinging only once
            }
            await fetchPlaylist();
            
            if (playlist.length > 0) {
                playNext();
            } else {
                statusText.innerText = 'WAITING FOR CONTENT';
                setTimeout(initPlayer, 10000); // retry in 10s
            }
        }

        async function fetchPlaylist() {
            try {
                const response = await fetch(`/api/screens/playlist/?token=${token}`);
                if (response.ok) {
                    const data = await response.json();
                    playlist = data.playlist;
                } else {
                    console.error('Failed to fetch playlist');
                    statusText.innerText = 'INVALID TOKEN / ERROR';
                }
            } catch (e) {
                console.error(e);
                statusText.innerText = 'CONNECTION ERROR';
            }
        }

        function startPinging() {
            pingInterval = setInterval(() => {
                fetch('/api/screens/ping/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ token: token })
                });
            }, 60000); // ping every 60 seconds
        }

        async function logAnalytics(adId) {
            try {
                await fetch('/api/screens/analytics/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ token: token, ad_id: adId })
                });
            } catch (e) {
                console.error('Failed to log analytics:', e);
            }
        }

        async function playNext() {
            if (playlist.length === 0) {
                initPlayer();
                return;
            }

            // Periodically refresh playlist at sequence boundary
            if (currentIndex >= playlist.length) {
                currentIndex = 0;
                await fetchPlaylist();
                if (playlist.length === 0) {
                    mediaContainer.innerHTML = '';
                    statusText.innerText = 'WAITING FOR CONTENT';
                    setTimeout(initPlayer, 10000);
                    return;
                }
            }

            const ad = playlist[currentIndex];
            mediaContainer.innerHTML = '';
            
            const ext = ad.media_file.split('.').pop().toLowerCase();
            const isVideo = ['mp4', 'webm', 'ogg'].includes(ext);

            let element;
            if (isVideo) {
                element = document.createElement('video');
                element.src = ad.media_file;
                element.autoplay = true;
                element.muted = true; // Required for auto-play in modern browsers sometimes
                element.className = 'media-element';
                
                element.onended = () => {
                    transitionNext(ad.id);
                };
                
                element.onerror = () => {
                    console.error("Error playing video:", ad.media_file);
                    transitionNext(ad.id);
                };
            } else {
                element = document.createElement('img');
                element.src = ad.media_file;
                element.className = 'media-element';
                
                element.onload = () => {
                    setTimeout(() => transitionNext(ad.id), ad.duration * 1000);
                };
                
                element.onerror = () => {
                    console.error("Error loading image:", ad.media_file);
                    setTimeout(() => transitionNext(ad.id), 1000);
                };
            }

            mediaContainer.appendChild(element);
            
            // Fade in
            setTimeout(() => {
                element.classList.add('active');
            }, 100);
        }

        async function transitionNext(adId) {
            await logAnalytics(adId);
            const currentElement = mediaContainer.querySelector('.media-element');
            if (currentElement) {
                currentElement.classList.remove('active');
            }
            
            currentIndex++;
            setTimeout(playNext, 1000); // 1s crossfade blank buffer
        }
    </script>
</body>
</html>
