{% extends 'base.html' %}

{% block content %}
<style>
    .terminal-container {
        background: #050505;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px;
        padding: 1.5rem;
        height: 60vh;
        overflow-y: auto;
        font-family: 'Courier New', Courier, monospace;
        font-size: 0.9rem;
        box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
    }
    
    .log-entry {
        margin-bottom: 0.5rem;
        color: var(--text-muted);
        animation: slideIn 0.3s ease-out forwards;
    }
    
    @keyframes slideIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .log-time { color: #88c0d0; }
    .log-screen { color: #a3be8c; font-weight: bold; }
    .log-ad { color: #ebcb8b; }
    .log-adv { color: #b48ead; }
    
    /* Custom Scrollbar for Terminal */
    .terminal-container::-webkit-scrollbar {
        width: 8px;
    }
    .terminal-container::-webkit-scrollbar-track {
        background: #050505;
        border-radius: 12px;
    }
    .terminal-container::-webkit-scrollbar-thumb {
        background: rgba(255,255,255,0.2);
        border-radius: 12px;
    }
</style>

<div class="header-top" style="margin-bottom: 1rem;">
    <h3 style="margin: 0;">Live System Logs</h3>
    <div style="color: var(--primary); font-size: 0.9rem; display: flex; align-items: center;">
        <span style="display:inline-block; width: 8px; height: 8px; background: var(--primary); border-radius: 50%; margin-right: 8px; box-shadow: 0 0 8px var(--primary); animation: blink 2s infinite;"></span>
        Polling Active
    </div>
</div>

<style>
    @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
    }
</style>

<div class="terminal-container" id="terminal">
    <div style="color: var(--text-muted); margin-bottom: 1rem;">// Connecting to AdStreamer telemetry stream...</div>
    <div id="logs-container"></div>
</div>

<script>
    const logsContainer = document.getElementById('logs-container');
    let knownLogIds = new Set();
    
    async function fetchLogs() {
        try {
            const response = await fetch('{% url "admin_system_logs_api" %}');
            if (response.ok) {
                const data = await response.json();
                
                // We want to process newer logs first, so reverse the chronological list.
                // Or rather, the API returns them ordered by '-timestamp' (newest first).
                // Let's prepend them if they are new.
                
                // Keep track of which logs we received to avoid displaying duplicates
                data.logs.reverse().forEach(log => {
                    if (!knownLogIds.has(log.id)) {
                        knownLogIds.add(log.id);
                        appendLog(log);
                    }
                });
            }
        } catch (e) {
            console.error("Failed to fetch logs", e);
        }
    }

    function appendLog(log) {
        const div = document.createElement('div');
        div.className = 'log-entry';
        
        div.innerHTML = `
            [<span class="log-time">${log.time}</span>] 
            SYSTEM MSG: Screen '<span class="log-screen">${log.screen_name}</span>' 
            played Ad '<span class="log-ad">${log.ad_title}</span>' 
            (User: <span class="log-adv">${log.advertiser}</span>)
        `;
        
        // Prepend to top
        if (logsContainer.firstChild) {
            logsContainer.insertBefore(div, logsContainer.firstChild);
        } else {
            logsContainer.appendChild(div);
        }
        
        // Keep terminal from getting infinitely long
        if (logsContainer.children.length > 100) {
            logsContainer.removeChild(logsContainer.lastChild);
        }
    }

    // Initial fetch
    fetchLogs();
    
    // Poll every 3 seconds
    setInterval(fetchLogs, 3000);
</script>

{% endblock %}
